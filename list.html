<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="book recommendations" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
  <title>My Reading List — Reader’s Haven</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header container">
    <div class="site-header__top">
      <div class="site-header__branding">
        <img src="Logo.png" alt="Reader's Haven logo" class="site-header__logo" />
      </div>

      <nav class="nav" aria-label="Main navigation">
        <a href="index.html" class="nav__link">Home</a>
        <a href="list.html" class="nav__link nav__link--active">Saved Books</a>
      </nav>
    </div>

    <div class="site-header__title-group">
      <h1 class="site-header__title">My Reading List</h1>
      <p class="site-header__subtitle">Track your reading progress and manage your saved books.</p>
    </div>
  </header>

  <main class="container">
    <section class="panel">
      <p class="panel__text muted">
        Update progress to <strong>Started</strong> or <strong>Finished</strong>. Your changes save to the database.
      </p>
      <div id="status" class="status" aria-live="polite"></div>
    </section>

    <section id="list" class="book-grid" aria-label="Saved books"></section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p class="site-footer__text">Keep track of your reading journey and discover what’s next.</p>
    </div>
  </footer>

  <script src="js/config.js?v=1"></script>
  <script src="js/storage.js?v=1"></script>
  <script src="js/ui.js?v=1"></script>
  <script src="js/list.js?v=1"></script>
</body>
</html>
