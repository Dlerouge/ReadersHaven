<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta
    name="description"
    content="Browse Reader’s Haven search results to discover books that match your interests and save them to your reading list."
  />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
  <title>Results — Reader’s Haven</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header container">
    <div class="site-header__top">
      <div class="site-header__branding">
        <img src="Logo.png" alt="Reader's Haven logo" class="site-header__logo" />
      </div>

      <nav class="nav" aria-label="Main navigation">
        <a href="index.html" class="nav__link">Home</a>
        <a href="list.html" class="nav__link">Saved Books</a>
      </nav>
    </div>

    <div class="site-header__title-group">
      <h1 class="site-header__title">Search Results</h1>
      <p class="site-header__subtitle">Browse your recommended books and save the ones you want to read.</p>
    </div>
  </header>

  <main class="container">
    <h2 class="sr-only">Book Search Results</h2>
    <div id="status" class="status" aria-live="polite"></div>
    <section id="results" class="book-grid" aria-label="Book results"></section>
  </main>

  <footer class="site-footer">
    <div class="container site-footer__content">
      <div class="site-footer__brand">
        <h3>Reader’s Haven</h3>
        <p>Discover your next favorite book, one mood at a time.</p>
      </div>

      <div class="site-footer__links">
        <a href="index.html">Home</a>
        <a href="list.html">Reading List</a>
      </div>

      <div class="site-footer__meta">
        <p>&copy; 2026 Reader’s Haven</p>
        <p>Designed by De'ovyun LeRouge</p>
      </div>
    </div>
  </footer>

  <script src="js/config.js?v=1"></script>
  <script src="js/api.js?v=1"></script>
  <script src="js/storage.js?v=1"></script>
  <script src="js/ui.js?v=1"></script>
  <script src="js/results.js?v=1"></script>
</body>
</html>
